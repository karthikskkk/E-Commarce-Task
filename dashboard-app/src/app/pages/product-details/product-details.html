@if (product) {
  <div class="max-w-6xl mx-auto p-8 grid md:grid-cols-2 gap-10">
    <div class="bg-white p-10 rounded-2xl shadow-lg">
      <img [src]="product.image" class="w-full h-[400px] object-contain" />
    </div>

    <div>
      <h1 class="text-4xl font-bold mb-5">
        {{ product.title }}
      </h1>

      <p class="text-gray-500 mb-5">
        {{ product.category }}
      </p>

      <p class="text-lg leading-8">
        {{ product.description }}
      </p>

      <h2 class="text-5xl font-bold text-green-600 mt-8">₹ {{ product.price }}</h2>
    </div>
  </div>
}
