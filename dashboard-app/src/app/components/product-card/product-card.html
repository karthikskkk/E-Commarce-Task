<div class="bg-white rounded-xl shadow-lg p-5 hover:scale-105 duration-300">
  <img [src]="product.image" class="w-full h-60 object-contain" />

  <h2 class="text-lg font-bold mt-4">
    {{ product.title }}
  </h2>

  <p class="text-gray-500 mt-3 line-clamp-2">
    {{ product.description }}
  </p>

  <div class="flex justify-between items-center mt-5">
    <span class="text-2xl font-bold text-green-600"> ₹ {{ product.price }} </span>

    <button (click)="addToCart()" class="bg-black text-white px-4 py-2 rounded-lg">Add</button>
  </div>
</div>
